<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FF Arena - Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0f;color:white;font-family:'Segoe UI',sans-serif;padding-bottom:80px;}
    .topbar{background:linear-gradient(135deg,#1a0a2e,#0d0d1a);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
    .topbar h1{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .wallet-badge{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:20px;padding:6px 14px;font-size:0.85rem;color:#f59e0b;font-weight:700;cursor:pointer;}
    .tabs-filter{display:flex;gap:8px;margin:15px;overflow-x:auto;padding-bottom:5px;}
    .tab-f{padding:7px 18px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#9ca3af;font-size:0.82rem;cursor:pointer;white-space:nowrap;transition:all 0.3s;}
    .tab-f.active{background:linear-gradient(135deg,#f59e0b,#ef4444);color:white;border-color:transparent;}
    .section{padding:0 15px;}
    .tournament-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:transform 0.2s;}
    .tournament-card:active{transform:scale(0.98);}
    .card-banner{height:110px;background:linear-gradient(135deg,#1a0a2e,#0f1729);display:flex;align-items:center;justify-content:center;position:relative;}
    .card-banner img{width:100%;height:100%;object-fit:cover;}
    .status-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:10px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
    .status-live{background:rgba(34,197,94,0.2);border:1px solid #22c55e;color:#22c55e;}
    .status-upcoming{background:rgba(59,130,246,0.2);border:1px solid #3b82f6;color:#3b82f6;}
    .status-completed{background:rgba(107,114,128,0.2);border:1px solid #6b7280;color:#6b7280;}
    .card-body{padding:14px;}
    .card-title{font-size:1rem;font-weight:700;margin-bottom:8px;}
    .card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
    .meta-tag{background:rgba(255,255,255,0.06);border-radius:6px;padding:3px 8px;font-size:0.75rem;color:#9ca3af;}
    .card-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .stat-box{background:rgba(255,255,255,0.04);border-radius:10px;padding:8px;text-align:center;}
    .stat-label{font-size:0.65rem;color:#6b7280;text-transform:uppercase;letter-spacing:1px;}
    .stat-value{font-size:0.95rem;font-weight:700;color:#f59e0b;margin-top:2px;}
    .progress-bar{background:rgba(255,255,255,0.08);border-radius:10px;height:6px;margin-bottom:5px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:10px;}
    .progress-text{font-size:0.72rem;color:#9ca3af;text-align:right;margin-bottom:12px;}
    .btn-join{width:100%;padding:12px;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:12px;color:white;font-weight:700;font-size:0.95rem;cursor:pointer;letter-spacing:1px;}
    .btn-join:disabled{opacity:0.4;cursor:not-allowed;background:rgba(255,255,255,0.1);}
    .btn-joined{background:rgba(34,197,94,0.15)!important;border:1px solid #22c55e;color:#22c55e!important;}
    .room-info{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:10px;padding:10px;margin-bottom:10px;font-size:0.8rem;}
    .room-info .room-title{color:#22c55e;font-weight:700;margin-bottom:5px;}
    .room-info .room-detail{color:#9ca3af;}
    .room-countdown{color:#f59e0b;font-size:0.75rem;margin-top:4px;}
    .empty-state{text-align:center;padding:50px 20px;color:#4b5563;}
    .empty-state i{font-size:3rem;margin-bottom:10px;display:block;}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d1a;border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:200;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 5px;color:#6b7280;font-size:0.65rem;text-decoration:none;transition:color 0.2s;}
    .nav-item.active{color:#f59e0b;}
    .nav-item i{font-size:1.2rem;margin-bottom:2px;}
    .loading{text-align:center;padding:40px;color:#6b7280;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:flex-end;justify-content:center;}
    .modal-overlay.show{display:flex;}
    .modal-sheet{background:#111827;border-radius:20px 20px 0 0;padding:25px;width:100%;max-width:500px;border-top:1px solid rgba(255,255,255,0.1);}
    .modal-sheet h3{font-size:1.1rem;font-weight:700;margin-bottom:5px;}
    .modal-sheet p{color:#9ca3af;font-size:0.82rem;margin-bottom:20px;}
    .fee-display{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:15px;text-align:center;margin-bottom:20px;}
    .fee-display .amount{font-size:1.8rem;font-weight:900;color:#f59e0b;}
    .fee-display .label{font-size:0.75rem;color:#9ca3af;margin-top:4px;}
    .wallet-info{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
    .wallet-info span{color:#9ca3af;font-size:0.82rem;}
    .wallet-info strong{color:#22c55e;font-size:1rem;}
    .btn-confirm{width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:12px;color:white;font-weight:700;font-size:1rem;cursor:pointer;margin-bottom:10px;}
    .btn-confirm:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-cancel{width:100%;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#9ca3af;font-size:0.9rem;cursor:pointer;}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1f2937;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 20px;font-size:0.88rem;z-index:500;display:none;white-space:nowrap;max-width:90vw;}
    .toast.show{display:block;}
    .toast.success{border-color:#22c55e;color:#86efac;}
    .toast.error{border-color:#ef4444;color:#fca5a5;}
  </style>
</head>
<body>
<div class="topbar">
  <h1>⚡ FF ARENA</h1>
  <div class="wallet-badge" onclick="window.location.href='wallet.html'">
    <i class="fas fa-wallet"></i> Rs.<span id="walletBal">0.00</span>
  </div>
</div>

<div class="tabs-filter">
  <button class="tab-f active" onclick="filterTournaments('all',this)">🎮 All</button>
  <button class="tab-f" onclick="filterTournaments('live',this)">🔴 Live</button>
  <button class="tab-f" onclick="filterTournaments('upcoming',this)">🔵 Upcoming</button>
  <button class="tab-f" onclick="filterTournaments('completed',this)">⚫ Completed</button>
</div>

<div class="section">
  <div id="tournamentsList"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
</div>

<!-- JOIN MODAL -->
<div class="modal-overlay" id="joinModal">
  <div class="modal-sheet">
    <h3 id="modalTitle">Tournament Join Karein</h3>
    <p id="modalDesc">Kya aap sure hain?</p>
    <div class="fee-display">
      <div class="amount">Rs.<span id="modalFee">0</span></div>
      <div class="label">Entry Fee — Wallet se deduct hoga</div>
    </div>
    <div class="wallet-info">
      <span><i class="fas fa-wallet"></i> Aapka Balance</span>
      <strong>Rs.<span id="modalWallet">0</span></strong>
    </div>
    <button class="btn-confirm" id="confirmJoinBtn" onclick="confirmJoin()">
      <i class="fas fa-check"></i> Confirm Join
    </button>
    <button class="btn-cancel" onclick="closeJoinModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <a class="nav-item active" href="home.html"><i class="fas fa-home"></i>Home</a>
  <a class="nav-item" href="wallet.html"><i class="fas fa-wallet"></i>Wallet</a>
  <a class="nav-item" href="profile.html"><i class="fas fa-user"></i>Profile</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://djohisxyahugicokwpox.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqb2hpc3h5YWh1Z2ljb2t3cG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDg3MjYsImV4cCI6MjA5NTkyNDcyNn0.yw1ouxc9eIPAU_ZO1GMHUpZ4bW6ddzrwllb4GmtrVjI';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let currentUser=null,userProfile=null,allTournaments=[],selectedTournament=null,userRegistrations=[];

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  // Check if admin - redirect to admin panel
  const {data:p}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(p?.is_admin){window.location.href='admin.html';return;}
  if(p?.is_blocked){await sb.auth.signOut();window.location.href='index.html';return;}
  userProfile=p;
  document.getElementById('walletBal').textContent=parseFloat(p?.wallet_balance||0).toFixed(2);
  await loadTournaments();
  await loadUserRegistrations();
})();

async function loadTournaments(){
  const {data,error}=await sb.from('tournaments').select('*').eq('is_hidden',false).order('match_date',{ascending:true});
  if(error){document.getElementById('tournamentsList').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Load nahi hua. Refresh karein.</p></div>';return;}
  allTournaments=data||[];
  renderTournaments(allTournaments);
}

async function loadUserRegistrations(){
  if(!currentUser)return;
  const {data}=await sb.from('registrations').select('tournament_id').eq('user_id',currentUser.id);
  userRegistrations=(data||[]).map(r=>r.tournament_id);
  renderTournaments(allTournaments);
}

function renderTournaments(list){
  const container=document.getElementById('tournamentsList');
  if(!list.length){
    container.innerHTML='<div class="empty-state"><i class="fas fa-gamepad"></i><p>Koi tournament nahi hai abhi.</p></div>';
    return;
  }
  container.innerHTML=list.map(t=>{
    const filled=t.filled_slots||0,max=t.max_slots||1;
    const pct=Math.min(100,Math.round((filled/max)*100));
    const isJoined=userRegistrations.includes(t.id);
    const matchDate=new Date(t.match_date);
    const dateStr=matchDate.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const statusText=t.status==='live'?'🔴 LIVE':t.status==='upcoming'?'🔵 Upcoming':'⚫ Completed';
    const statusClass=`status-${t.status}`;

    // Room ID logic - show only if joined AND within 5 min of match
    let roomSection='';
    if(isJoined&&t.room_id){
      const now=new Date();
      const diffMs=matchDate-now;
      const diffMin=Math.floor(diffMs/60000);
      if(diffMs<=0){
        roomSection=`<div class="room-info">
          <div class="room-title"><i class="fas fa-key"></i> Room Details</div>
          <div class="room-detail">Room ID: <strong style="color:white">${t.room_id}</strong></div>
          <div class="room-detail">Password: <strong style="color:white">${t.room_password||'N/A'}</strong></div>
        </div>`;
      }else if(diffMin<=5){
        roomSection=`<div class="room-info">
          <div class="room-title"><i class="fas fa-key"></i> Room Details (Match Starting Soon!)</div>
          <div class="room-detail">Room ID: <strong style="color:white">${t.room_id}</strong></div>
          <div class="room-detail">Password: <strong style="color:white">${t.room_password||'N/A'}</strong></div>
        </div>`;
      }else{
        roomSection=`<div class="room-info">
          <div class="room-title"><i class="fas fa-lock"></i> Room Details</div>
          <div class="room-countdown"><i class="fas fa-clock"></i> Match se 5 min pehle dikhega (${diffMin} min baki)</div>
        </div>`;
      }
    }

    return `<div class="tournament-card">
      <div class="card-banner">
        <span style="font-size:2.5rem">🎮</span>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${t.title}</div>
        <div class="card-meta">
          <span class="meta-tag"><i class="fas fa-map"></i> ${t.map_name}</span>
          <span class="meta-tag"><i class="fas fa-users"></i> ${t.mode}</span>
          <span class="meta-tag"><i class="fas fa-clock"></i> ${dateStr}</span>
        </div>
        <div class="card-stats">
          <div class="stat-box"><div class="stat-label">Entry Fee</div><div class="stat-value">Rs.${t.entry_fee}</div></div>
          <div class="stat-box"><div class="stat-label">Prize Pool</div><div class="stat-value">Rs.${t.prize_pool}</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${filled}/${max} slots filled</div>
        ${roomSection}
        ${t.status==='completed'
          ?`<button class="btn-join" disabled>⚫ Completed</button>`
          :isJoined
          ?`<button class="btn-join btn-joined" disabled><i class="fas fa-check"></i> Joined</button>`
          :filled>=max
          ?`<button class="btn-join" disabled>Full</button>`
          :(t.status==='live'||t.status==='upcoming')
          ?`<button class="btn-join" onclick="openJoinModal('${t.id}')"><i class="fas fa-bolt"></i> JOIN NOW — Rs.${t.entry_fee}</button>`
          :`<button class="btn-join" disabled>Closed</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function filterTournaments(status,el){
  document.querySelectorAll('.tab-f').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(status==='all')renderTournaments(allTournaments);
  else renderTournaments(allTournaments.filter(t=>t.status===status));
}

function openJoinModal(tId){
  selectedTournament=allTournaments.find(t=>t.id===tId);
  if(!selectedTournament)return;
  document.getElementById('modalTitle').textContent=selectedTournament.title;
  document.getElementById('modalDesc').textContent=`${selectedTournament.map_name} • ${selectedTournament.mode}`;
  document.getElementById('modalFee').textContent=selectedTournament.entry_fee;
  document.getElementById('modalWallet').textContent=parseFloat(userProfile?.wallet_balance||0).toFixed(2);
  document.getElementById('joinModal').classList.add('show');
}
function closeJoinModal(){document.getElementById('joinModal').classList.remove('show');selectedTournament=null;}

async function confirmJoin(){
  if(!selectedTournament)return;
  const balance=parseFloat(userProfile?.wallet_balance||0);
  const fee=parseFloat(selectedTournament.entry_fee);
  if(balance<fee){showToast('❌ Wallet balance kam hai! Deposit karein.','error');closeJoinModal();return;}
  const btn=document.getElementById('confirmJoinBtn');
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing...';
  try{
    const {data:existing}=await sb.from('registrations').select('id').eq('tournament_id',selectedTournament.id).eq('user_id',currentUser.id).single();
    if(existing){showToast('Aap already join kar chuke hain!','error');closeJoinModal();return;}
    const newBalance=balance-fee;
    await sb.from('profiles').update({wallet_balance:newBalance}).eq('id',currentUser.id);
    await sb.from('registrations').insert({tournament_id:selectedTournament.id,user_id:currentUser.id});
    await sb.from('transactions').insert({user_id:currentUser.id,type:'tournament_fee',amount:fee,status:'approved',note:`Joined: ${selectedTournament.title}`});
    await sb.from('tournaments').update({filled_slots:(selectedTournament.filled_slots||0)+1}).eq('id',selectedTournament.id);
    userProfile.wallet_balance=newBalance;
    document.getElementById('walletBal').textContent=newBalance.toFixed(2);
    showToast('✅ Tournament join ho gaya!','success');
    closeJoinModal();
    await loadTournaments();
    await loadUserRegistrations();
  }catch(e){showToast('❌ Error: '+e.message,'error');}
  btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Confirm Join';
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
