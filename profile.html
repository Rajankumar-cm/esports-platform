<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FF Arena - Profile</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0f;color:white;font-family:'Segoe UI',sans-serif;padding-bottom:80px;}
    .topbar{background:linear-gradient(135deg,#1a0a2e,#0d0d1a);padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .topbar h1{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .profile-card{margin:15px;background:linear-gradient(135deg,#1a0a2e,#0f172a);border:1px solid rgba(245,158,11,0.2);border-radius:20px;padding:25px;text-align:center;}
    .avatar{width:80px;height:80px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 15px;}
    .profile-name{font-size:1.3rem;font-weight:700;margin-bottom:5px;}
    .profile-phone{color:#9ca3af;font-size:0.85rem;margin-bottom:10px;}
    .ff-id-badge{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:8px 15px;display:inline-block;color:#f59e0b;font-size:0.82rem;}
    .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:15px;}
    .stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:15px;text-align:center;}
    .stat-val{font-size:1.3rem;font-weight:700;color:#f59e0b;}
    .stat-lbl{font-size:0.65rem;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
    .section{padding:0 15px;margin-bottom:15px;}
    .section-title{font-size:0.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9ca3af;margin-bottom:12px;}
    .info-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    .info-label{color:#9ca3af;font-size:0.82rem;}
    .info-value{color:white;font-size:0.88rem;font-weight:600;}
    .btn-logout{width:calc(100% - 30px);margin:0 15px;padding:14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:14px;color:#ef4444;font-size:1rem;font-weight:700;cursor:pointer;}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d1a;border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:200;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 5px;cursor:pointer;color:#6b7280;font-size:0.65rem;text-decoration:none;}
    .nav-item.active{color:#f59e0b;}
    .nav-icon{font-size:1.4rem;margin-bottom:2px;}
  </style>
</head>
<body>
<div class="topbar"><h1>&#128100; Profile</h1></div>

<div class="profile-card">
  <div class="avatar">&#128100;</div>
  <div class="profile-name" id="pName">Loading...</div>
  <div class="profile-phone" id="pPhone">-</div>
  <div class="ff-id-badge">FF ID: <span id="pFFID">-</span></div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-val" id="statBalance">0</div>
    <div class="stat-lbl">Balance</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statTournaments">0</div>
    <div class="stat-lbl">Played</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statWins">0</div>
    <div class="stat-lbl">Wins</div>
  </div>
</div>

<div class="section">
  <div class="section-title">Account Details</div>
  <div class="info-item"><span class="info-label">Full Name</span><span class="info-value" id="dName">-</span></div>
  <div class="info-item"><span class="info-label">Phone Number</span><span class="info-value" id="dPhone">-</span></div>
  <div class="info-item"><span class="info-label">Free Fire ID</span><span class="info-value" id="dFFID">-</span></div>
  <div class="info-item"><span class="info-label">Member Since</span><span class="info-value" id="dJoined">-</span></div>
  <div class="info-item"><span class="info-label">Account Status</span><span class="info-value" style="color:#22c55e;">&#10003; Active</span></div>
</div>

<button class="btn-logout" onclick="handleLogout()">&#128682; Logout</button>

<nav class="bottom-nav">
  <a class="nav-item" href="home.html"><div class="nav-icon">&#127968;</div>Home</a>
  <a class="nav-item" href="wallet.html"><div class="nav-icon">&#128176;</div>Wallet</a>
  <a class="nav-item active" href="profile.html"><div class="nav-icon">&#128100;</div>Profile</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://djohisxyahugicokwpox.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqb2hpc3h5YWh1Z2ljb2t3cG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDg3MjYsImV4cCI6MjA5NTkyNDcyNn0.yw1ouxc9eIPAU_ZO1GMHUpZ4bW6ddzrwllb4GmtrVjI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  const {data:p} = await sb.from('profiles').select('*').eq('id',session.user.id).single();
  if(p){
    document.getElementById('pName').textContent = p.full_name||'User';
    document.getElementById('pPhone').textContent = p.phone||'-';
    document.getElementById('pFFID').textContent = p.free_fire_id||'-';
    document.getElementById('dName').textContent = p.full_name||'-';
    document.getElementById('dPhone').textContent = p.phone||'-';
    document.getElementById('dFFID').textContent = p.free_fire_id||'-';
    document.getElementById('statBalance').textContent = '₹'+parseFloat(p.wallet_balance||0).toFixed(0);
    document.getElementById('dJoined').textContent = new Date(p.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }
  const {data:regs} = await sb.from('registrations').select('id').eq('user_id',session.user.id);
  document.getElementById('statTournaments').textContent = regs?.length||0;
  const {data:wins} = await sb.from('winners').select('id').eq('user_id',session.user.id);
  document.getElementById('statWins').textContent = wins?.length||0;
})();

async function handleLogout(){
  await sb.auth.signOut();
  window.location.href='index.html';
}
</script>
</body>
</html>
